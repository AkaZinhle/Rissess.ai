      I am your autonomous AI underwriting analyst. To begin a risk assessment,
      paste the extracted text from a business loan application or insurance
      document into the chat.

      I will automatically:
      - 🔍 Run a web reputation check on the applicant entity
      - 📚 Cross-reference against internal policy compliance guidelines
      - ⚠️ Identify key risk factors
      - 📄 Generate a structured Risk Memo
